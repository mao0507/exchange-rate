name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Set Vite base for GitHub Pages
        id: base
        run: |
          NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$NAME" == *.github.io ]]; then
            echo "vite_base=/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base=/${NAME}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: pnpm build
        env:
          VITE_BASE: ${{ steps.base.outputs.vite_base }}
          # Repository secret 或 variable 擇一（見 README）；secret 名稱：VITE_RTER_LIVE_URL
          VITE_RTER_LIVE_URL: ${{ secrets.VITE_RTER_LIVE_URL || vars.VITE_RTER_LIVE_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
